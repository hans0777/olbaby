<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오엘베이비 관리자 - 온라인 버전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 설정 페이지 (처음 접속 시) -->
    <div id="setupPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-pink-600 mb-2">오엘베이비</h1>
                <p class="text-gray-600">관리자 페이지 초기 설정</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Supabase URL
                    </label>
                    <input type="text" id="setupUrl"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-pink-500 focus:outline-none"
                        placeholder="https://xxxxx.supabase.co">
                    <p class="text-xs text-gray-500 mt-1">Supabase 프로젝트 URL을 입력하세요</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Supabase API Key (anon)
                    </label>
                    <textarea id="setupKey" rows="3"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-pink-500 focus:outline-none font-mono text-xs"
                        placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
                    <p class="text-xs text-gray-500 mt-1">anon public 키를 입력하세요</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        관리자 비밀번호
                    </label>
                    <input type="password" id="setupPassword"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-pink-500 focus:outline-none"
                        placeholder="비밀번호 입력">
                </div>

                <button onclick="saveSetup()"
                    class="w-full bg-gradient-to-r from-pink-500 to-pink-600 text-white font-semibold py-3 rounded-lg hover:shadow-lg transition-all">
                    설정 저장 및 로그인
                </button>

                <p class="text-xs text-gray-500 text-center mt-4">
                    ⚠️ 입력한 정보는 이 기기의 브라우저에만 저장됩니다.<br>
                    다른 기기에서는 다시 설정이 필요합니다.
                </p>
            </div>
        </div>
    </div>

    <!-- 로그인 페이지 (설정 완료 후) -->
    <div id="loginPage" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-pink-600 mb-2">오엘베이비</h1>
                <p class="text-gray-600">관리자 로그인</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        비밀번호
                    </label>
                    <input type="password" id="loginPassword"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-pink-500 focus:outline-none"
                        placeholder="비밀번호 입력">
                </div>

                <button onclick="login()"
                    class="w-full bg-gradient-to-r from-pink-500 to-pink-600 text-white font-semibold py-3 rounded-lg hover:shadow-lg transition-all">
                    로그인
                </button>

                <button onclick="resetSetup()"
                    class="w-full text-sm text-gray-500 hover:text-gray-700 mt-4">
                    설정 초기화
                </button>
            </div>
        </div>
    </div>

    <!-- 관리자 페이지 (로그인 후) -->
    <div id="adminPage" class="hidden">
        <iframe id="adminFrame" style="width: 100%; height: 100vh; border: none;"></iframe>
    </div>

    <script>
        const ADMIN_PASSWORD_KEY = 'olbaby_admin_password';
        const SUPABASE_URL_KEY = 'olbaby_supabase_url';
        const SUPABASE_KEY_KEY = 'olbaby_supabase_key';

        // 페이지 로드 시
        window.addEventListener('DOMContentLoaded', function() {
            checkSetup();
        });

        // 설정 확인
        function checkSetup() {
            const url = localStorage.getItem(SUPABASE_URL_KEY);
            const key = localStorage.getItem(SUPABASE_KEY_KEY);
            const password = localStorage.getItem(ADMIN_PASSWORD_KEY);

            if (url && key && password) {
                // 설정 완료 - 로그인 페이지 표시
                document.getElementById('setupPage').classList.add('hidden');
                document.getElementById('loginPage').classList.remove('hidden');
            } else {
                // 설정 필요 - 설정 페이지 표시
                document.getElementById('setupPage').classList.remove('hidden');
                document.getElementById('loginPage').classList.add('hidden');
            }
        }

        // 설정 저장
        function saveSetup() {
            const url = document.getElementById('setupUrl').value.trim();
            const key = document.getElementById('setupKey').value.trim();
            const password = document.getElementById('setupPassword').value.trim();

            if (!url || !key || !password) {
                alert('모든 항목을 입력해주세요.');
                return;
            }

            if (!url.includes('supabase.co')) {
                alert('올바른 Supabase URL을 입력해주세요.');
                return;
            }

            if (!key.startsWith('eyJ')) {
                alert('올바른 API 키를 입력해주세요.');
                return;
            }

            // localStorage에 저장
            localStorage.setItem(SUPABASE_URL_KEY, url);
            localStorage.setItem(SUPABASE_KEY_KEY, key);
            localStorage.setItem(ADMIN_PASSWORD_KEY, password);

            alert('설정이 저장되었습니다!');

            // 관리자 페이지로 이동
            loadAdminPage();
        }

        // 로그인
        function login() {
            const inputPassword = document.getElementById('loginPassword').value;
            const savedPassword = localStorage.getItem(ADMIN_PASSWORD_KEY);

            if (inputPassword === savedPassword) {
                loadAdminPage();
            } else {
                alert('비밀번호가 올바르지 않습니다.');
            }
        }

        // 관리자 페이지 로드
        function loadAdminPage() {
            const url = localStorage.getItem(SUPABASE_URL_KEY);
            const key = localStorage.getItem(SUPABASE_KEY_KEY);

            // admin.html을 가져와서 API 키 주입
            fetch('admin.html')
                .then(response => response.text())
                .then(html => {
                    // API 키 교체
                    html = html.replace(/const SUPABASE_URL = 'YOUR_SUPABASE_URL';/,
                        `const SUPABASE_URL = '${url}';`);
                    html = html.replace(/const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';/,
                        `const SUPABASE_ANON_KEY = '${key}';`);

                    // Blob으로 변환하여 iframe에 로드
                    const blob = new Blob([html], { type: 'text/html' });
                    const blobUrl = URL.createObjectURL(blob);

                    document.getElementById('setupPage').classList.add('hidden');
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('adminPage').classList.remove('hidden');
                    document.getElementById('adminFrame').src = blobUrl;
                })
                .catch(error => {
                    console.error('Error loading admin page:', error);
                    alert('관리자 페이지를 로드할 수 없습니다.');
                });
        }

        // 설정 초기화
        function resetSetup() {
            if (confirm('설정을 초기화하시겠습니까?\n저장된 모든 정보가 삭제됩니다.')) {
                localStorage.removeItem(SUPABASE_URL_KEY);
                localStorage.removeItem(SUPABASE_KEY_KEY);
                localStorage.removeItem(ADMIN_PASSWORD_KEY);
                location.reload();
            }
        }

        // Enter 키로 로그인
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (!document.getElementById('loginPage').classList.contains('hidden')) {
                    login();
                } else if (!document.getElementById('setupPage').classList.contains('hidden')) {
                    saveSetup();
                }
            }
        });
    </script>
</body>
</html>
