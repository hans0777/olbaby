<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오엘베이비 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 로그인 페이지 -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-pink-600 mb-2">오엘베이비</h1>
                <p class="text-gray-600">관리자 로그인</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        비밀번호
                    </label>
                    <input type="password" id="loginPassword"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-pink-500 focus:outline-none text-lg"
                        placeholder="비밀번호 입력"
                        autofocus>
                </div>

                <button onclick="login()"
                    class="w-full bg-gradient-to-r from-pink-500 to-pink-600 text-white font-semibold py-3 rounded-lg hover:shadow-lg transition-all">
                    로그인
                </button>

                <p class="text-xs text-gray-400 text-center mt-4">
                    비밀번호: admin123
                </p>
            </div>
        </div>
    </div>

    <!-- 관리자 페이지 -->
    <div id="adminPage" class="hidden">
        <iframe id="adminFrame" style="width: 100%; height: 100vh; border: none;"></iframe>
    </div>

    <script>
        // 간단한 비밀번호 체크
        const ADMIN_PASSWORD = 'admin123';

        // Supabase 설정 (코드에 직접 포함)
        const SUPABASE_URL = 'https://exyzjhdbgroxiasxacif.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4eXpqaGRiZ3JveGlhc3hhY2lmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDA4MTgsImV4cCI6MjA5MTQxNjgxOH0.Q_kiC76PCat0oeG2FyO_Y4rXUoeWNJUcayjUxDRNZK8';

        // Enter 키로 로그인
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        // 로그인
        function login() {
            const password = document.getElementById('loginPassword').value;

            if (password === ADMIN_PASSWORD) {
                loadAdminPage();
            } else {
                alert('비밀번호가 올바르지 않습니다.');
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginPassword').focus();
            }
        }

        // 관리자 페이지 로드
        function loadAdminPage() {
            // admin.html을 가져와서 API 키 주입
            fetch('admin.html')
                .then(response => response.text())
                .then(html => {
                    // API 키 교체
                    html = html.replace(/const SUPABASE_URL = 'YOUR_SUPABASE_URL';/,
                        `const SUPABASE_URL = '${SUPABASE_URL}';`);
                    html = html.replace(/const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';/,
                        `const SUPABASE_ANON_KEY = '${SUPABASE_ANON_KEY}';`);

                    // Blob으로 변환하여 iframe에 로드
                    const blob = new Blob([html], { type: 'text/html' });
                    const blobUrl = URL.createObjectURL(blob);

                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('adminPage').classList.remove('hidden');
                    document.getElementById('adminFrame').src = blobUrl;
                })
                .catch(error => {
                    console.error('Error loading admin page:', error);
                    alert('관리자 페이지를 로드할 수 없습니다.');
                });
        }
    </script>
</body>
</html>
